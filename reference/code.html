<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .cta-gradient {
            background: linear-gradient(135deg, #1849e5 0%, #2E5BFF 100%);
        }
        body {
            font-family: 'Pretendard', sans-serif;
        }
        .clear-image {
            filter: none !important;
            backdrop-filter: none !important;
        }
    </style>
<style>
    @keyframes neon-pulse-red {
      0%, 100% { box-shadow: 0 0 4px #FF3131, 0 0 10px #FF3131; }
      50% { box-shadow: 0 0 8px #FF3131, 0 0 20px #FF3131; }
    }
    @keyframes neon-pulse-green {
      0%, 100% { box-shadow: 0 0 4px #39FF14, 0 0 10px #39FF14; }
      50% { box-shadow: 0 0 8px #39FF14, 0 0 20px #39FF14; }
    }
    .animate-neon-pulse-red {
      animation: neon-pulse-red 2s infinite ease-in-out;
    }
    .animate-neon-pulse-green {
      animation: neon-pulse-green 2s infinite ease-in-out;
    }
    </style>
</head>
<body class="bg-surface font-pretendard text-on-surface-variant antialiased">
<main class="relative">

<section class="relative w-full overflow-hidden bg-black">

<p class="text-on-surface font-bold text-2xl leading-relaxed tracking-tight font-pretendard">
                    제이코치의 1인 기업 커리큘럼을<br/>직접 경험해 보세요!
                </p>
</div>
<!-- Divider -->
<div class="w-12 h-1 bg-[#1849e5]/20 rounded-full mx-auto mb-6"></div>
<!-- Course Card -->
<div class="bg-surface-container-lowest rounded-3xl shadow-[0_12px_32px_rgba(43,42,81,0.06)] border border-[#aba9d7]/15 text-left max-w-lg mx-auto p-5">
<div class="flex flex-col gap-4">
<div class="flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="inline-flex items-center px-3 py-1 rounded-full bg-[#FFF1F1] text-[#FF3131] text-xs font-bold font-pretendard uppercase tracking-wider animate-neon-pulse-red">

</div>

</div>
</div>
</div>

<div class="flex items-baseline gap-2">

<span class="text-base font-bold text-on-surface font-pretendard">원</span>

</div>

<span class="material-symbols-outlined text-lg">play_circle</span>

</div>
</div>
</div>
